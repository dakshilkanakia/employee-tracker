name: employee_tracker
description: "Internal employee task management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Navigation
  go_router: ^14.2.7

  # State management
  provider: ^6.1.2

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # UI / utilities
  intl: ^0.19.0
  fl_chart: ^0.69.0
  flutter_colorpicker: ^1.1.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
